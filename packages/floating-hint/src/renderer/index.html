<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:7777"
    />
    <title>Wuide</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1e1e2e;
        color: #f5f5f5;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard',
          system-ui, sans-serif;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 12px;
        background: #1e1e2e;
        font-size: 13px;
        line-height: 1.4;
      }
      .hint-window {
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: 100%;
      }
      .progress-badge {
        font-size: 11px;
        opacity: 0.7;
      }
      .scenario-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 320px;
        overflow-y: auto;
      }

      /* ── 목표 섹션 (compact) ── */
      .goal-section {
        background: rgba(80, 130, 255, 0.10);
        border-left: 3px solid #5a8eff;
        border-radius: 4px;
        padding: 8px 10px;
      }
      .goal-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
      }
      .goal-icon { font-size: 14px; }
      .goal-title {
        font-weight: 600;
        font-size: 13px;
      }
      .goal-text {
        opacity: 0.7;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre-wrap;
        margin-bottom: 6px;
      }
      .goal-link {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .scenario-link-btn {
        background: #5a8eff;
        color: #fff;
        border: 0;
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .scenario-link-btn:hover { background: #4078e6; }
      .goal-url {
        opacity: 0.55;
        font-size: 10px;
        font-family: ui-monospace, monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }

      /* ── 현재 단계 섹션 (메인, 강조) ── */
      .step-section {
        background: rgba(255, 255, 255, 0.06);
        border-left: 3px solid #ffd700;
        border-radius: 4px;
        padding: 10px 12px;
      }
      .step-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding-bottom: 6px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      }
      .step-counter {
        font-weight: 700;
        font-size: 13px;
        color: #ffd700;
      }
      .step-id {
        font-size: 11px;
        opacity: 0.5;
        font-family: ui-monospace, monospace;
      }
      .step-intent-block { margin-bottom: 8px; }
      .step-label {
        font-size: 10px;
        font-weight: 600;
        opacity: 0.55;
        margin-bottom: 3px;
        letter-spacing: 0.3px;
      }
      .step-intent {
        font-size: 13px;
        line-height: 1.5;
        color: #ffffff;
        white-space: pre-wrap;
      }
      .step-success-block {
        background: rgba(80, 200, 120, 0.10);
        border-radius: 3px;
        padding: 6px 8px;
      }
      .step-success {
        font-size: 11px;
        line-height: 1.4;
        opacity: 0.85;
        white-space: pre-wrap;
      }
      .response-panel {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        padding: 8px 10px;
        max-height: 100px;
        overflow-y: auto;
      }
      .response-panel p {
        margin: 0;
      }
      .response-empty {
        opacity: 0.6;
        font-size: 12px;
      }
      .action-buttons {
        display: flex;
        gap: 8px;
      }
      .action-btn {
        flex: 1;
        padding: 8px 12px;
        background: #4a4a6a;
        color: #fff;
        border: 1px solid #6a6a8a;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .action-btn:hover:not(:disabled) {
        background: #5a5a7a;
      }
      .action-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .consent-blocker, .retry-banner, .rate-paused-banner {
        background: rgba(255, 100, 100, 0.15);
        border-left: 3px solid #ff6464;
        padding: 6px 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>

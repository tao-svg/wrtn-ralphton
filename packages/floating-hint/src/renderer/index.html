<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:7777"
    />
    <title>Onboarding Hint</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1e1e2e;
        color: #f5f5f5;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard',
          system-ui, sans-serif;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 12px;
        background: #1e1e2e;
        font-size: 13px;
        line-height: 1.4;
      }
      .hint-window {
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: 100%;
      }
      .progress-badge {
        font-size: 11px;
        opacity: 0.7;
      }
      .scenario-panel {
        background: rgba(80, 130, 255, 0.12);
        border-left: 3px solid #5a8eff;
        border-radius: 4px;
        padding: 8px 10px;
        font-size: 12px;
        max-height: 220px;
        overflow-y: auto;
      }
      .scenario-title {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .scenario-goal {
        opacity: 0.75;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .scenario-step-header {
        font-weight: 600;
        color: #8ab4ff;
        margin-top: 6px;
      }
      .scenario-step-intent {
        margin-top: 2px;
        line-height: 1.4;
      }
      .scenario-step-success {
        margin-top: 4px;
        opacity: 0.6;
        font-size: 11px;
      }
      .response-panel {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        padding: 8px 10px;
        max-height: 100px;
        overflow-y: auto;
      }
      .response-panel p {
        margin: 0;
      }
      .response-empty {
        opacity: 0.6;
        font-size: 12px;
      }
      .action-buttons {
        display: flex;
        gap: 8px;
      }
      .action-btn {
        flex: 1;
        padding: 8px 12px;
        background: #4a4a6a;
        color: #fff;
        border: 1px solid #6a6a8a;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .action-btn:hover:not(:disabled) {
        background: #5a5a7a;
      }
      .action-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .consent-blocker, .retry-banner, .rate-paused-banner {
        background: rgba(255, 100, 100, 0.15);
        border-left: 3px solid #ff6464;
        padding: 6px 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>

version: 2
schema: ai-coaching

items:
  # 항목 1: P2 + P4
  - id: install-homebrew
    title: Homebrew 설치
    estimated_minutes: 3

    clipboard_inject:
      command: '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
      ui_hint: "터미널을 열고 ⌘V로 붙여넣어 실행하세요"

    verification:
      type: command
      command: brew --version
      poll_interval_sec: 5

  # 항목 2: P2 + P4
  - id: configure-git
    title: Git 글로벌 설정
    estimated_minutes: 1

    inputs:
      - key: git_name
        label: Git 사용자 이름
        required: true
      - key: git_email
        label: Git 이메일
        required: true

    clipboard_inject:
      command: |
        git config --global user.name "{{inputs.git_name}}" && \
        git config --global user.email "{{inputs.git_email}}"

    verification:
      type: command
      command: git config --global user.email
      expect_contains: "{{inputs.git_email}}"

  # 항목 3: P5+ + P8 + P4 (MVP 핵심 시연)
  - id: install-security-agent
    title: 사내 보안 에이전트 설치
    estimated_minutes: 15

    ai_coaching:
      overall_goal: |
        사용자가 사내 보안 에이전트(.pkg)를 다운로드하고 설치한 뒤,
        시스템 환경설정에서 권한을 부여하고 백그라운드 프로세스가 실행되도록 한다.

      steps:
        - id: download
          intent: |
            security.wrtn.io/download 페이지에서 .pkg 파일을 다운로드한다.
          success_criteria: |
            ~/Downloads 폴더에 SecurityAgent-*.pkg 파일이 존재한다.

        - id: install
          intent: |
            .pkg 파일을 더블클릭해서 설치 마법사를 진행한다.
            관리자 비밀번호 입력이 필요하다.
          success_criteria: |
            /Applications/SecurityAgent.app 디렉토리가 존재한다.

        - id: grant_permission
          intent: |
            시스템 환경설정 → 개인정보 보호 및 보안에서
            SecurityAgent에 디스크 접근 권한을 부여한다.
          system_panel_url: x-apple.systempreferences:com.apple.preference.security
          success_criteria: |
            pgrep SecurityAgent 결과가 PID를 반환한다.
          common_mistakes: |
            - 잠금 해제 안 한 채 클릭 시도
            - SecurityAgent가 PrivilegedHelperTools 폴더에 있어 일반 Applications 폴더에서 못 찾음

    verification:
      type: process_check
      process_name: SecurityAgent
      poll_interval_sec: 5

  # 항목 4: P5+ + P8 + P4
  - id: setup-vpn
    title: 사내망 VPN 설정
    estimated_minutes: 10

    clipboard_inject:
      command: 'open https://vpn.wrtn.ax/profile'
      ui_hint: "VPN 프로파일 다운로드 페이지가 열립니다"

    ai_coaching:
      overall_goal: "VPN 프로파일을 macOS에 등록하고 연결 가능 상태로"
      steps:
        - id: download_profile
          intent: ".mobileconfig 파일 다운로드"
          success_criteria: "~/Downloads에 wrtn-vpn.mobileconfig 존재"

        - id: install_profile
          intent: "다운로드된 파일을 더블클릭하여 시스템 환경설정으로 가져오기"
          system_panel_url: x-apple.systempreferences:com.apple.preferences.configurationprofiles
          success_criteria: "프로파일 목록에 WRTN VPN 표시"

    verification:
      type: command
      command: scutil --nc list
      expect_contains: "WRTN VPN"

  # 항목 5: P2 + P8 (Gmail 서명)
  - id: setup-gmail-signature
    title: Gmail 회사 표준 서명 등록
    estimated_minutes: 5

    inputs:
      - key: job_title
        label: 직무
        required: true
      - key: phone
        label: 전화번호
        required: true

    clipboard_inject:
      command: 'open https://mail.google.com/mail/u/0/#settings/general'
      ui_hint: "Gmail 설정 페이지가 열립니다"

    template:
      content: |
        {{user_profile.name}}
        {{inputs.job_title}}
        Wrtn Technologies
        Tel: {{inputs.phone}}
      paste_target: "Gmail 서명 입력란에 ⌘V로 붙여넣기"

    ai_coaching:
      overall_goal: "Gmail 설정의 서명 영역에 회사 표준 서명을 등록"
      steps:
        - id: navigate_to_signature
          intent: "Gmail 설정에서 '서명' 영역까지 스크롤"
          success_criteria: "화면에 '서명' 헤더와 [+ 새로 만들기] 버튼이 보임"

        - id: input_signature
          intent: "[+ 새로 만들기]로 서명 추가, 클립보드 내용 붙여넣기, 기본 서명으로 지정"
          success_criteria: "서명 미리보기에 사용자 이름이 표시되고 기본 서명 드롭다운에 선택됨"

        - id: save
          intent: "페이지 하단 [변경사항 저장] 버튼 클릭"
          success_criteria: "변경사항 저장 알림 표시"

  # 항목 6: P2 + P5+ + P8 + P4 (PoC 시나리오 — GitHub PAT 발급)
  - id: github-pat
    title: GitHub Personal Access Token 발급
    estimated_minutes: 5

    inputs:
      - key: token_note
        label: Token 이름 (예 claude-cli)
        required: true

    clipboard_inject:
      command: 'open https://github.com/settings/tokens/new'
      ui_hint: "브라우저가 자동으로 열립니다 (또는 터미널에 ⌘V)"

    ai_coaching:
      overall_goal: |
        github.com/settings/tokens 에서 classic PAT를 새로 생성한다.
        Note에 토큰 이름, expiration 선택, repo scope만 체크한 뒤 Generate.
        표시된 ghp_ 토큰을 즉시 클립보드에 복사한다.

      steps:
        - id: navigate
          intent: |
            GitHub 토큰 생성 페이지로 이동한 뒤 'Generate new token (classic)'을 클릭한다.
            (fine-grained 옵션은 PoC에서 제외 — repo scope 모델이 단순한 classic 사용.)
          success_criteria: |
            'New personal access token (classic)' 헤더와 Note 입력 필드가 보인다.

        - id: fill_form
          intent: |
            Note 필드에 '{{inputs.token_note}}' 입력.
            Expiration은 30 days 권장 (보안).
            Select scopes에서 'repo' 하나만 체크. 다른 scope는 모두 비워둔다.
          success_criteria: |
            페이지 하단 'Generate token' 버튼이 활성화 상태(녹색)로 보인다.
          common_mistakes: |
            - workflow / admin:org 같은 광범위 scope 체크하면 권한 과다.
            - Note 비우면 Generate 비활성화.

        - id: generate_and_copy
          intent: |
            'Generate token' 클릭. 표시된 ghp_… 토큰 옆 복사 아이콘 클릭.
            (이 페이지를 떠나면 토큰을 다시 볼 수 없으므로 반드시 복사.)
          success_criteria: |
            ghp_ 또는 github_pat_ 으로 시작하는 토큰이 녹색 박스로 표시되고,
            클립보드에 복사된 후 알림이 사라진다.
          common_mistakes: |
            - 'Generate token' 클릭 전 페이지 이탈 → 토큰 미생성.
            - 토큰 한 번만 표시 — 닫으면 재발급해야 함.

    verification:
      type: command
      command: bash -c "pbpaste | grep -E '^(ghp_|github_pat_)' >/dev/null"
      poll_interval_sec: 5
